name: Auto-Merge Renovate PRs

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  auto-merge-renovate:
    name: Auto-Merge Renovate PRs
    runs-on: ubuntu-latest
    if: github.actor == 'renovate[bot]'
    permissions:
      pull-requests: write
      contents: write
    timeout-minutes: 10

    steps:
      - name: Generate GitHub App Token
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.DEV_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.DEV_AUTOMATION_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Skip major updates
        if: contains(github.event.pull_request.labels.*.name, 'major')
        run: |
          echo "⏭️ Major update detected. Skipping auto-merge for manual review."
          exit 1

      - name: Auto-approve and merge
        run: |
          echo "✅ Auto-merging Renovate dependency update"
          echo "  - PR: #${PR_NUMBER}"
          echo "  - Title: ${PR_TITLE}"

          gh pr review "${PR_NUMBER}" --approve \
            --body "✅ Auto-approved Renovate dependency update"

          gh pr merge "${PR_NUMBER}" --auto --rebase
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}

      - name: Handle failures
        if: failure()
        run: |
          echo "❌ Auto-merge failed"
          gh pr comment "${PR_NUMBER}" \
            --body "❌ Auto-merge failed. Please check the workflow logs and consider manual review."
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
