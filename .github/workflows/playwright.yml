name: Playwright E2E Tests

on:
  push:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  e2e-test:
    name: E2E (${{ matrix.browser }}${{ matrix.shardIndex && format(' {0}/{1}', matrix.shardIndex, matrix.shardTotal) || '' }})
    timeout-minutes: 15
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Desktop browsers with sharding (2 shards each)
          - browser: chromium
            binary: chromium
            shardIndex: 1
            shardTotal: 2
          - browser: chromium
            binary: chromium
            shardIndex: 2
            shardTotal: 2
          - browser: firefox
            binary: firefox
            shardIndex: 1
            shardTotal: 2
          - browser: firefox
            binary: firefox
            shardIndex: 2
            shardTotal: 2
          - browser: webkit
            binary: webkit
            shardIndex: 1
            shardTotal: 2
          - browser: webkit
            binary: webkit
            shardIndex: 2
            shardTotal: 2
          # Mobile browsers with sharding (2 shards each)
          - browser: mobile-chrome
            binary: chromium
            shardIndex: 1
            shardTotal: 2
          - browser: mobile-chrome
            binary: chromium
            shardIndex: 2
            shardTotal: 2
          - browser: mobile-safari
            binary: webkit
            shardIndex: 1
            shardTotal: 2
          - browser: mobile-safari
            binary: webkit
            shardIndex: 2
            shardTotal: 2

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ matrix.binary }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps ${{ matrix.binary }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps ${{ matrix.binary }}

      - name: Run Playwright tests
        run: pnpm run test:e2e -- --project=${{ matrix.browser }} --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: blob-report-${{ matrix.browser }}-${{ matrix.shardIndex }}
          path: blob-report/
          retention-days: 1

  merge-reports:
    name: Merge Reports
    if: ${{ !cancelled() }}
    needs: [e2e-test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download blob reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into HTML Report
        run: pnpm exec playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload HTML report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  e2e-test-summary:
    name: E2E Tests Summary
    runs-on: ubuntu-latest
    needs: [e2e-test]
    if: always()
    steps:
      - name: Check test results
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
